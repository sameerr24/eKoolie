<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment - eKoolie</title>

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Racing+Sans+One&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="payment.css" />
  </head>

  <body>
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-badge">
          <span style="font-size: 20px">🚂</span>
        </div>
        <div>
          <div class="brand-title racing-font">eKoolie</div>
          <div style="font-size: 12px; color: #9aa3a6; margin-top: 4px">
            Koolie at your station
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="home.html" class="nav-link">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3"
            ></path>
          </svg>
          Home
        </a>
        <a href="book.html" class="nav-link active">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M12 2v6m0 0v6m0-6h6m-6 0H6"></path>
          </svg>
          Book Porter
        </a>
      </nav>
    </aside>

    <main class="main">
      <div class="card">
        <h2 style="margin-top: 0">Payment Details</h2>

        <div class="payment-summary">
          <div class="summary-row">
            <span>Porter Service (Madhav Gaba)</span>
            <span>₹150</span>
          </div>
          <div class="summary-row">
            <span>Platform Fee</span>
            <span>₹20</span>
          </div>
          <div class="summary-row total">
            <span>Total Amount</span>
            <span>₹170</span>
          </div>
        </div>

        <h3 style="font-size: 16px; margin-bottom: 16px">
          Select Payment Method
        </h3>
        <div class="payment-methods">
          <div class="method-option selected" onclick="selectMethod(this)">
            <div class="radio"></div>
            <span>UPI / QR Code</span>
          </div>
          <div class="method-option" onclick="selectMethod(this)">
            <div class="radio"></div>
            <span>Credit / Debit Card</span>
          </div>
          <div class="method-option" onclick="selectMethod(this)">
            <div class="radio"></div>
            <span>Cash on Service</span>
          </div>
        </div>

        <button
          class="btn btn-primary"
          onclick="alert('Payment Successful! Your porter is confirmed.')"
        >
          Pay ₹170
        </button>
      </div>
    </main>

    <script src="payment.js"></script>
  </body>
</html>
