<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Book a Porter - eKoolie</title>

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Racing+Sans+One&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="book.css" />
  </head>

  <body>
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-badge">
          <span style="font-size: 20px">🚂</span>
        </div>
        <div>
          <div class="brand-title racing-font">eKoolie</div>
          <div style="font-size: 12px; color: #9aa3a6; margin-top: 4px">
            Koolie at your station
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="home.html" class="nav-link">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3"
            ></path>
          </svg>
          Home
        </a>
        <a href="book.html" class="nav-link active">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M12 2v6m0 0v6m0-6h6m-6 0H6"></path>
          </svg>
          Book Porter
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="#" onclick="logout()" class="nav-link" style="color: #ef4444">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          Logout
        </a>
      </div>
    </aside>

    <main class="main">
      <div id="userGreeting" class="user-greeting"></div>
      <div class="card">
        <h1 style="margin-top: 0; margin-bottom: 24px">Book a Porter</h1>

        <form id="bookingForm" onsubmit="handleSearch(event)">
          <div class="form-group">
            <label class="form-label">Train Number</label>
            <input
              type="text"
              class="form-input"
              placeholder="e.g. 12951"
              required
            />
          </div>

          <div class="grid-2">
            <div class="form-group">
              <label class="form-label">Coach</label>
              <input
                type="text"
                class="form-input"
                placeholder="e.g. B2"
                required
              />
            </div>
            <div class="form-group">
              <label class="form-label">Seat Number</label>
              <input
                type="text"
                class="form-input"
                placeholder="e.g. 45"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Arrival Station</label>
            <input
              type="text"
              class="form-input"
              placeholder="e.g. New Delhi"
              required
            />
          </div>

          <div class="grid-2">
            <div class="form-group">
              <label class="form-label">Platform Number</label>
              <input
                type="text"
                class="form-input"
                placeholder="e.g. 12"
                required
              />
            </div>
            <div class="form-group">
              <label class="form-label">Arrival Time</label>
              <input type="time" class="form-input" required />
            </div>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%">
            Search Nearby Porters
          </button>
        </form>

        <div id="resultSection" class="hidden">
          <div class="result-card">
            <h3 style="margin: 0 0 8px 0; color: var(--cyan)">
              Porter Assigned!
            </h3>
            <p style="margin: 0; color: var(--muted)">
              We found a verified porter available for your arrival.
            </p>

            <div class="porter-preview">
              <div class="porter-avatar"></div>
              <div>
                <div style="font-weight: 700; font-size: 18px">Madhav Gaba</div>
                <div style="color: var(--muted); font-size: 14px">
                  ID: KL-2024-89 • ⭐ 4.8
                </div>
              </div>
            </div>

            <div class="grid-2">
              <a
                href="porter_profile.html"
                class="btn btn-outline"
                style="text-align: center"
                >View Details</a
              >
              <a
                href="payment.html"
                class="btn btn-primary"
                style="text-align: center"
                >Pay Now</a
              >
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="book.js"></script>
  </body>
</html>
